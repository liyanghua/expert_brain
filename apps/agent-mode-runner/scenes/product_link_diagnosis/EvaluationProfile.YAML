profile_id: eval.product_link_diagnosis.v1
profile_name: 商品链接诊断场景 EvaluationProfile
scene: 商品链接诊断
domain: ecommerce_growth
version: v1
status: draft

description: >
  用于评估商品链接诊断场景文档的结构化抽取质量、优化质量与发布 readiness。
  重点关注：结构完整度、判断标准明确性、验证方式完整性、来源可追溯性和推断边界控制。

core_metrics:
  - field_coverage
  - field_accuracy
  - item_f1
  - source_grounding_rate
  - structural_consistency
  - gap_detection_accuracy
  - inference_handling_accuracy
  - human_revision_rate

metric_thresholds:
  field_coverage:
    target: 0.85
    minimum: 0.75
    rationale: 商品链接诊断文档的主干字段较稳定，覆盖率过低说明结构化抽取未抓到业务骨架。
  field_accuracy:
    target: 0.85
    minimum: 0.75
    rationale: 字段语义正确性不足会直接影响后续优化 Plan 的方向。
  item_f1:
    target: 0.80
    minimum: 0.70
    rationale: 列表字段很多，尤其是问题类型、指标、标准、动作；条目级准确率是核心。
  source_grounding_rate:
    target: 0.90
    minimum: 0.80
    rationale: Ground Truth 要求强可追溯性，来源绑定不足会显著降低可信度。
  structural_consistency:
    target: 0.90
    minimum: 0.80
    rationale: 商品链接诊断必须形成“问题-指标-标准-动作-验证”闭环。
  gap_detection_accuracy:
    target: 0.80
    minimum: 0.70
    rationale: 缺口识别不准会导致后续优化 Plan 跑偏。
  inference_handling_accuracy:
    target: 0.90
    minimum: 0.85
    rationale: 诊断类文档常有归纳内容，必须严格控制推断边界。
  human_revision_rate:
    target_max: 0.30
    hard_max: 0.45
    rationale: 若专家修改率过高，说明抽取结果虽然存在，但不可用。

field_weights:
  business_scenario: 1.0
  scenario_goal: 1.0
  required_inputs: 0.8
  deliverables: 0.6
  process_flow_or_business_model: 1.0
  execution_steps: 1.2
  key_node_rationales: 0.8
  page_screenshots: 0.5
  faq_types: 1.0
  judgment_basis: 1.2
  judgment_criteria: 1.5
  resolution_methods: 1.2
  trigger_conditions: 1.0
  termination_conditions: 0.8
  validation_methods: 1.3
  tool_templates: 0.6
  exceptions_and_non_applicable_scope: 0.7

critical_fields:
  - business_scenario
  - scenario_goal
  - process_flow_or_business_model
  - execution_steps
  - judgment_basis
  - judgment_criteria
  - resolution_methods
  - trigger_conditions
  - validation_methods

list_fields:
  - required_inputs
  - deliverables
  - execution_steps
  - key_node_rationales
  - page_screenshots
  - faq_types
  - judgment_basis
  - judgment_criteria
  - resolution_methods
  - trigger_conditions
  - termination_conditions
  - validation_methods
  - tool_templates
  - exceptions_and_non_applicable_scope

single_fields:
  - business_scenario
  - scenario_goal
  - process_flow_or_business_model

hard_gates:
  - gate_id: gate_criteria_required
    description: judgment_criteria 不能为空且不能只是 partial
    condition: judgment_criteria.field_status in [drafted, confirmed, inferred_candidate]
  - gate_id: gate_validation_required
    description: validation_methods 不能为空且不能只是 missing
    condition: validation_methods.field_status in [drafted, confirmed, inferred_candidate]
  - gate_id: gate_source_grounding_required
    description: 来源绑定必须达到最低门槛
    condition: source_grounding_rate >= 0.80
  - gate_id: gate_structural_consistency_required
    description: 结构一致性必须达到最低门槛
    condition: structural_consistency >= 0.80
  - gate_id: gate_inference_boundary_required
    description: 推断内容处理必须规范
    condition: inference_handling_accuracy >= 0.85

gap_priority_rules:
  - priority: P1
    when:
      - judgment_criteria.field_status in [missing, partial]
    reason: 判断标准缺失会直接削弱可执行性
  - priority: P1
    when:
      - validation_methods.field_status in [missing, partial]
    reason: 缺少验证方式无法证明优化有效
  - priority: P2
    when:
      - termination_conditions.field_status == missing
    reason: 流程缺少收束边界
  - priority: P2
    when:
      - process_flow_or_business_model.field_status == missing
    reason: 缺少底层诊断模型会影响步骤理解
  - priority: P3
    when:
      - tool_templates.field_status == missing
    reason: 影响复用性，但不一定阻止诊断逻辑成立

expert_review_dimensions:
  - completeness
  - accuracy
  - clarity
  - actionability
  - traceability

expert_review_scoring_scale:
  min: 1
  max: 5
  acceptable: 4
