profile_id: guidance.product_link_diagnosis.expert.v1
profile_name: 商品链接诊断场景 ExpertGuidanceProfile
scene: 商品链接诊断
domain: ecommerce_growth
role: 电商经营诊断专家
version: v1
status: draft

description: >
  用于指导系统以“商品链接诊断专家”的视角理解业务文档，
  强化关键字段抽取、问题识别、缺口判断、优化 Plan 优先级和推断边界控制。

terminology_preferences:
  - term: 商品链接优化
    normalized_to: 商品链接诊断
    notes: 二者可视为同一业务目标下的不同表达
  - term: 流量不精准
    normalized_to: 人群/流量匹配问题
    notes: 通常意味着用户标签与商品标签不一致，或推广圈选不准
  - term: 判断指标
    normalized_to: judgment_basis
    notes: 指代变量、信号、核心数据依据
  - term: 判断标准
    normalized_to: judgment_criteria
    notes: 指代阈值、等级、对比标准、时间窗口
  - term: 优化动作
    normalized_to: resolution_methods
    notes: 指代问题后的具体修改措施
  - term: 验证方式
    normalized_to: validation_methods
    notes: 指代动作有效性的验证逻辑或复盘指标

extraction_guidance:
  - 优先识别“目标、问题分类、指标、阈值、动作、验证方式”六类信息，这些构成链接诊断文档的主干
  - 如果文档中存在明确的“诊断维度拆解”或“业务模型”，优先作为 process_flow_or_business_model 抽取
  - execution_steps 应按业务逻辑顺序抽取，不应简单按自然语言顺序罗列
  - 如果一段同时包含问题、指标和动作，优先拆分成 faq_types、judgment_basis、resolution_methods 三个字段
  - 如果一段同时包含阈值和等级，应优先归入 judgment_criteria
  - “为什么这么做”的解释优先归入 key_node_rationales，而不是 scenario_goal
  - deliverables 若未显式出现，但文档明显导向“诊断结论/优化方案/执行表”，可以归纳 candidate

gap_detection_guidance:
  - 若文档有 judgment_basis 但没有明确阈值或等级规则，应视为 judgment_criteria 缺失或弱项
  - 若有 faq_types 与 resolution_methods，但没有 validation_methods，应视为严重弱项
  - 若有 trigger_conditions 但没有 termination_conditions，应视为流程边界不完整
  - 若有工具名称但没有表单、诊断表、模板结构，不应误判为 tool_templates 已完整
  - 若 execution_steps 存在，但没有 process_flow_or_business_model，应判断为框架解释不完整
  - 若文档没有明确 exceptions_and_non_applicable_scope，且判断逻辑依赖样本量或平台规则，应提示补边界条件

planning_guidance:
  - 优先补 judgment_criteria，因为它最直接决定文档是否可执行
  - 第二优先补 validation_methods，因为没有验证方式就无法证明优化是否有效
  - 第三优先补 termination_conditions，因为没有终止条件会导致流程无法收束
  - 若结构混乱，应优先重构 process_flow_or_business_model 与 execution_steps 的对应关系
  - 若 source grounding 不足，应优先重新绑定来源，而不是先润色文案
  - 若 inferred_candidate 过多，应优先做专家确认，而不是继续自动补写
  - 对于问题分类不清晰的文档，应先补 faq_types，再补 resolution_methods
  - 对于指标多但标准弱的文档，应先补 judgment_criteria，再补 validation_methods

inference_boundaries:
  - key_node_rationales 可以基于全文逻辑归纳，但必须标 inferred_candidate
  - termination_conditions 若非原文明写，只能以 candidate 形式提出
  - exceptions_and_non_applicable_scope 若文档未写，不允许系统直接补成 confirmed
  - deliverables 若是从全文归纳得出，必须标 inferred_candidate
  - page_screenshots 不允许凭空生成实际截图内容，只能标识缺失或建议补充类型
  - tool_templates 不允许把“工具名”直接当成“模板名”
  - 不允许把“指标”误当成“判断标准”
  - 不允许把“动作”误当成“问题类型”

quality_preferences:
  - 优先提升结构完整度，而不是文案修辞
  - 优先提升 judgment_criteria 和 validation_methods 的清晰度
  - 优先提升 source grounding 和 traceability
  - 优先降低 inferred_candidate 的未确认数量
  - 优先保证问题-指标-标准-动作-验证形成完整闭环

expert_qa_guidance:
  when_field_missing:
    - 如果缺 judgment_criteria，优先问：这些指标的高低好坏标准是什么？
    - 如果缺 validation_methods，优先问：怎么证明这些优化动作有效？
    - 如果缺 termination_conditions，优先问：什么情况下停止优化或转入维持？
    - 如果缺 tool_templates，优先问：有没有可复用的诊断表或执行模板？
    - 如果缺 exceptions_and_non_applicable_scope，优先问：这种判断在什么情况下不成立？
  when_field_weak:
    - 如果 execution_steps 过粗，优先问：这一步是否还应拆成更细的步骤？
    - 如果 faq_types 过少，优先问：除了这些问题，是否还有常见异常模式？
    - 如果 judgment_basis 多但标准弱，优先问：这些指标分别怎么看是差、合格、优秀？

preferred_output_style:
  - 输出应偏结构化、可执行，而不是偏概念化
  - 尽量用“问题-指标-标准-动作-验证”闭环表达
  - 诊断类文档应强调顺序与判定逻辑
  - 对不确定内容要明确标 candidate，不要伪装成事实
